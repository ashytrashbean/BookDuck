<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="code.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Profile</title>
</head>
<body>
    <header>
        <a href="./home.html" class="headIcons">
            <img id="logoImg" alt="a duck behing a book logo" height="90px">
            <h2>BookDuck</h2>
        </a>
        <div class="headIcons">
            <span class="usersName">Full Name</span>
            <a href="./profile.html" title="Profile"><img src="./icons/user.png" alt="profile" height="30px"></a>
            <a title="LogOut" id="logoutBtn"><img src="./icons/logout.png" alt="logout" height="30px"></a>
        </div>
    </header>

    <section>
        <img src="" alt="" height="50px">
        <h2 class="usersName"> </h2>
    </section>

    <div id="adminSection">
        <h2>Upload New Book</h2>
        <form id="uploadForm">
            <input type="text" id="bookTitle" placeholder="Book Title" required> <br>
            <input type="text" id="bookAuthor" placeholder="Author" required> <br>
            <input type="number" id="bookPages" placeholder="Book's amount of pages"><br>
            <input type="text" id="bookRelease" placeholder="Book's release date in: dd/mm/yy"> <br>
            <label for="bookCover">Cover Image:</label> 
            <input type="file" id="bookCover" > <br>
            <button type="submit">Publish Book</button>
        </form>
    </div>
    
    <div class="userBooks">

        <div>
            <img src="./icons/tbr.png" alt="" height="40px">
            <h3>TBR List</h3> <br> 
            <select name="filter" id="tbrFilter" title="Filter TBR books">
                <option hidden>Sort By</option>
                <option value="title">Title</option>
                <option value="author">Author</option>
            </select> 
            <div id="tbrDiv"></div>
        </div>
        

        <div >
            <img src="./icons/rated.png" alt="" height="40px">
            <h3>Rated Books</h3> <br>
            <select id="ratedFilter" title="Sort your ratings">
                <option value="rating">Sort By: Highest Rating</option>
                <option value="title">Sort By: Title</option>
                <option value="author">Sort By: Author</option>
            </select>
            <div id="ratedDiv"></div>   
        </div>
        
    </div>
    
</body>
</html>
