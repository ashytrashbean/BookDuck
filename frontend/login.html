<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="code.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>LogIn & Register</title>
</head>
<body>
    <header>
        <a href="./index.html" class="headIcons">
            <img id="logoImg" alt="a duck behing a book logo" height="90px">
            <h2>BookDuck</h2>
        </a>
    </header>

    <main id="logReg">
        <div id="login">
            <h2>Login</h2> <br>
            <label>Username: <br> <input type="text" name="username" id="username" placeholder="username"></label><br>
            <label>Password: <br> <input type="password" name="password" id="password" placeholder="password"></label><br><br>
            <button type="button" id="logBtn">Login</button>
        </div>
    
        <div id="registration">
            <h2>Registration</h2> <br>
            <label>Username: <br> <input type="text" name="username" id="regUsername" placeholder="username"></label><br>
            <label>Email: <br><input type="email" name="username" id="regemail" placeholder="first.last@mail.com"></label><br>
            <label>Password: <br><input type="password" name="password" id="regPassword" placeholder="password"></label><br><br>
            <button type="button" id="regBtn">Register</button>
        </div>
    </main>
</body>
</html>
