<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="code.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Profile</title>
</head>
<body>
    <header>
        <a href="./home.html">
            <h2>BookDuck</h2>
        </a>
        <div class="headIcons">
            <span class="usersName">Full Name</span>
            <a title="Profile">Profile</a>
            <a title="LogOut" id="logoutBtn">LogOut</a>
        </div>
    </header>

    <section>
        <img src="" alt="" height="50px">
        <h2 class="usersName"> </h2>
    </section>
    
    <div class="userBooks">

        <div>
            <h3>TBR List</h3> <br> 
            <select name="filter" id="tbrFilter" title="Filter TBR books">
                <option hidden>Sort By</option>
                <option value="title">Title</option>
                <option value="author">Author</option>
            </select> 
            <div id="tbrDiv"></div>
        </div>
        

        <div >
            <h3>Rated Books</h3> <br>
            <select id="ratedFilter" title="Sort your ratings">
                <option value="rating">Sort By: Highest Rating</option>
                <option value="title">Sort By: Title</option>
                <option value="author">Sort By: Author</option>
            </select>
            <div id="ratedDiv"></div>   
        </div>
        
    </div>
    
</body>
</html>
